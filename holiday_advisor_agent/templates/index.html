<!DOCTYPE html>
<!--
  Iter – AI Travel Planning Assistant
  Frontend: Single-page HTML/CSS/JS
  ===================================================================
  UI structure (two views inside one container):
    1. .greeting-page  – collects the user's name and destination photo,
                         then POSTs to /upload-photo.
    2. .chat-interface – the live conversation with Iter; hidden on load,
                         revealed after a successful /upload-photo response.

  All API calls are made from plain fetch() — no extra libraries required.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iter - AI Travel Agent</title>

    <style>
        /* ------------------------------------------------------------------ */
        /* GLOBAL RESET                                                         */
        /* Removes browser default margins/padding and uses border-box sizing  */
        /* so widths include padding and borders (easier layout math).         */
        /* ------------------------------------------------------------------ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ------------------------------------------------------------------ */
        /* PAGE BACKGROUND                                                      */
        /* A diagonal purple-to-violet gradient fills the full viewport.       */
        /* Flexbox centres the white card both horizontally and vertically.    */
        /* ------------------------------------------------------------------ */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;         /* Always at least the full screen height */
            display: flex;
            justify-content: center;   /* Horizontal centre                       */
            align-items: center;       /* Vertical centre                         */
            padding: 20px;             /* Breathing room on small screens          */
        }

        /* ------------------------------------------------------------------ */
        /* CARD CONTAINER                                                        */
        /* The single white card that houses both the greeting page and the    */
        /* chat interface.  overflow:hidden clips the child rounded corners.   */
        /* ------------------------------------------------------------------ */
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        /* ================================================================== */
        /* GREETING PAGE                                                        */
        /* ================================================================== */

        .greeting-page {
            padding: 60px 40px;
            text-align: center;
        }

        /* Large brand title */
        .greeting-page h1 {
            color: #2196F3;       /* Material Blue 500 – primary brand colour */
            font-size: 48px;
            margin-bottom: 10px;
        }

        /* Subtitle / tagline */
        .greeting-page p {
            color: #666;
            font-size: 18px;
            margin-bottom: 40px;
        }

        /* Wrapper for a label + input pair */
        .input-group {
            margin-bottom: 30px;
        }

        .input-group label {
            display: block;        /* Own line above the input */
            color: #333;
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        /* Name text field */
        .input-group input[type="text"] {
            width: 100%;
            max-width: 400px;      /* Caps the field width on wide screens */
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;  /* Smooth focus animation */
        }

        /* Highlight the field border when it receives focus */
        .input-group input[type="text"]:focus {
            outline: none;
            border-color: #2196F3;
        }

        /* Section wrapping the file picker and its status text */
        .upload-section {
            margin: 40px 0;
        }

        /* Green "Choose Photo" button that triggers the hidden file input */
        .upload-btn {
            background: #4CAF50;   /* Material Green 500 */
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .upload-btn:hover {
            background: #45a049;   /* Slightly darker on hover for feedback */
        }

        /* Text below the button; turns green once a file is chosen */
        .photo-status {
            margin-top: 10px;
            color: #888;
            font-size: 14px;
        }

        .photo-status.success {
            color: #4CAF50;        /* Green confirmation tick */
        }

        /* Primary CTA – moves the user into the chat interface */
        .continue-btn {
            background: #2196F3;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.3s;
        }

        /* Only show hover style when the button is active */
        .continue-btn:hover:not(:disabled) {
            background: #1976D2;
        }

        /* Greyed-out while name or photo is missing */
        .continue-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* ================================================================== */
        /* CHAT INTERFACE                                                        */
        /* Hidden on initial load; displayed as a flex column after greeting.  */
        /* ================================================================== */

        .chat-interface {
            display: none;          /* Toggled to 'flex' by JS after login */
            height: 700px;
            flex-direction: column; /* Stack header / messages / input vertically */
        }

        /* Blue top bar showing the assistant name, user welcome, and reset   */
        .chat-header {
            background: #2196F3;
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 24px;
        }

        .welcome-text {
            font-size: 14px;
            opacity: 0.9;           /* Slightly dimmed so it doesn't compete with h2 */
        }

        /* Destructive action button – wipes the session and reloads */
        .reset-btn {
            background: #f44336;    /* Material Red 500 */
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .reset-btn:hover {
            background: #da190b;
        }

        /* Scrollable area that holds all chat bubbles */
        .chat-messages {
            flex: 1;                /* Expands to fill remaining height in the column */
            overflow-y: auto;       /* Enables vertical scrolling when content overflows */
            padding: 30px;
            background: #f5f5f5;    /* Light grey distinguishes messages from the input */
        }

        /* Each individual message block (header + bubble) */
        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.3s; /* Slide-in effect when a message is appended */
        }

        /* Slide messages up from below when they appear */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Row containing the sender label and timestamp */
        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }

        .sender {
            font-weight: bold;
            margin-right: 10px;
        }

        /* Colour-code the sender name by participant */
        .sender.iter { color: #2196F3; }  /* Blue for the AI */
        .sender.user { color: #4CAF50; }  /* Green for the human */

        .timestamp {
            color: #999;
            font-size: 12px;
        }

        /* The actual speech-bubble box */
        .message-content {
            background: white;
            padding: 15px;
            border-radius: 10px;
            line-height: 1.6;
            white-space: pre-wrap;  /* Preserves newlines returned by the API */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* User messages get a subtle blue tint to distinguish them from Iter */
        .message.user-message .message-content {
            background: #e3f2fd;
        }

        /* ------------------------------------------------------------------ */
        /* CHAT INPUT BAR                                                        */
        /* Fixed at the bottom of the chat interface; textarea + send button.  */
        /* ------------------------------------------------------------------ */
        .chat-input {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 15px;             /* Space between the textarea and the button */
        }

        .chat-input textarea {
            flex: 1;               /* Takes all horizontal space minus the button */
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: 'Arial', sans-serif;
            resize: none;          /* Disable the drag handle – we control height via CSS */
            min-height: 60px;
            max-height: 120px;     /* Cap at ~3 lines before scrolling */
        }

        .chat-input textarea:focus {
            outline: none;
            border-color: #2196F3;
        }

        /* Send button – aligns to the bottom of the textarea */
        .send-btn {
            background: #2196F3;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            align-self: flex-end;  /* Anchors to the bottom even when textarea grows */
        }

        .send-btn:hover:not(:disabled) {
            background: #1976D2;
        }

        /* Greyed while the API call is in flight */
        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* ------------------------------------------------------------------ */
        /* LOADING INDICATOR                                                     */
        /* Shown inside the message area while waiting for the API.            */
        /* Uses a CSS content animation to cycle "." / ".." / "..." in place.  */
        /* ------------------------------------------------------------------ */
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%,  20% { content: '.';   }
            40%      { content: '..';  }
            60%, 100%{ content: '...'; }
        }

        /* Hide the native file picker; a styled button triggers it instead */
        input[type="file"] {
            display: none;
        }

        /* ------------------------------------------------------------------ */
        /* INLINE ERROR MESSAGE                                                  */
        /* Hidden by default; shown via JS when validation or fetch fails.     */
        /* ------------------------------------------------------------------ */
        .error-message {
            background: #ffebee;   /* Light red background */
            color: #c62828;        /* Dark red text */
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;         /* Toggled to 'block' by JS on error */
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ================================================================
             VIEW 1: GREETING PAGE
             Collects the user's name and a destination photo.
             Switched to display:none after a successful /upload-photo call.
             ================================================================ -->
        <div class="greeting-page" id="greetingPage">
            <h1>Welcome to Iter</h1>
            <p>Your AI Travel Planning Assistant</p>

            <!-- Name field — required before the Continue button activates -->
            <div class="input-group">
                <label for="userName">What's your name?</label>
                <input type="text" id="userName" placeholder="Enter your name" />
            </div>

            <!-- Photo upload section
                 The real <input type="file"> is hidden; clicking "Choose Photo"
                 triggers it programmatically via document.getElementById().click(). -->
            <div class="upload-section">
                <label>Upload a photo of your destination</label>
                <div style="margin-top: 15px;">
                    <!-- Hidden native file picker – accepts image/* formats -->
                    <input type="file" id="photoInput" accept="image/*" />

                    <!-- Visible styled button that proxies clicks to the file input -->
                    <button class="upload-btn" onclick="document.getElementById('photoInput').click()">
                        Choose Photo
                    </button>
                </div>
                <!-- Status text updated by JS when a file is selected -->
                <div class="photo-status" id="photoStatus">No photo uploaded</div>
            </div>

            <!-- Inline error banner; hidden until JS surfaces a validation error -->
            <div class="error-message" id="errorMessage"></div>

            <!-- Disabled until both name AND photo are provided (see checkContinueButton()) -->
            <button class="continue-btn" id="continueBtn" disabled onclick="submitGreeting()">
                Continue
            </button>
        </div>

        <!-- ================================================================
             VIEW 2: CHAT INTERFACE
             Hidden on load (display:none set in CSS); revealed after the
             greeting is successfully processed by the backend.
             ================================================================ -->
        <div class="chat-interface" id="chatInterface">

            <!-- Header bar: assistant brand + personalised greeting + reset -->
            <div class="chat-header">
                <div>
                    <h2>Iter</h2>
                    <!-- Populated by JS with "Welcome, <name>!" -->
                    <div class="welcome-text" id="welcomeText"></div>
                </div>
                <button class="reset-btn" onclick="resetChat()">Reset Chat</button>
            </div>

            <!-- Scrollable message log – messages appended here by addMessage() -->
            <div class="chat-messages" id="chatMessages">
                <!-- Message elements are injected dynamically by JavaScript -->
            </div>

            <!-- Bottom input bar – textarea grows up to 120px; Enter sends -->
            <div class="chat-input">
                <textarea
                    id="messageInput"
                    placeholder="Type your message here..."
                    onkeypress="handleKeyPress(event)">
                </textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div><!-- /.container -->

    <script>
        // ====================================================================
        // STATE
        // ====================================================================

        // Holds the File object chosen by the user; null means no photo yet.
        let selectedFile = null;


        // ====================================================================
        // GREETING PAGE – EVENT LISTENERS
        // ====================================================================

        /**
         * Photo picker change event.
         * Fired whenever the user selects a file from the OS dialog.
         * Updates the status text and re-evaluates the Continue button state.
         */
        document.getElementById('photoInput').addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];   // Store the File reference
                const fileName = selectedFile.name;

                // Show a green confirmation below the button
                document.getElementById('photoStatus').textContent = `✓ ${fileName}`;
                document.getElementById('photoStatus').classList.add('success');

                checkContinueButton();  // May now enable the Continue button
            }
        });

        /**
         * Re-evaluate whether the Continue button should be active.
         * Both fields (name text + photo file) must be present.
         */
        function checkContinueButton() {
            const userName    = document.getElementById('userName').value.trim();
            const continueBtn = document.getElementById('continueBtn');

            continueBtn.disabled = !(userName && selectedFile);
        }

        // Re-check on every keystroke in the name field
        document.getElementById('userName').addEventListener('input', checkContinueButton);

        // Allow pressing Enter in the name field as a shortcut for Continue
        document.getElementById('userName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !document.getElementById('continueBtn').disabled) {
                submitGreeting();
            }
        });


        // ====================================================================
        // submitGreeting()
        // ====================================================================
        /**
         * Called when the user clicks "Continue" on the greeting page.
         *
         * 1. Validates that both name and photo are present.
         * 2. POSTs a multipart/form-data request to /upload-photo.
         * 3. On success: hides the greeting page, shows the chat interface,
         *    and renders Iter's opening message.
         * 4. On failure: displays the error message inline.
         */
        async function submitGreeting() {
            const userName = document.getElementById('userName').value.trim();
            const errorMsg = document.getElementById('errorMessage');

            // Client-side validation (belt-and-suspenders alongside the button guard)
            if (!userName) {
                errorMsg.textContent  = 'Please enter your name';
                errorMsg.style.display = 'block';
                return;
            }
            if (!selectedFile) {
                errorMsg.textContent  = 'Please upload a destination photo';
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';   // Hide any previous error

            // Visual feedback while the API call is in flight
            document.getElementById('continueBtn').disabled    = true;
            document.getElementById('continueBtn').textContent = 'Processing...';

            // Build a multipart form payload (required for binary file upload)
            const formData = new FormData();
            formData.append('photo',    selectedFile);
            formData.append('userName', userName);

            try {
                const response = await fetch('/upload-photo', {
                    method: 'POST',
                    body:   formData   // Content-Type is set automatically by the browser
                });

                const data = await response.json();

                if (data.success) {
                    // Swap views: hide greeting, reveal chat
                    document.getElementById('greetingPage').style.display   = 'none';
                    document.getElementById('chatInterface').style.display  = 'flex';

                    // Personalise the header
                    document.getElementById('welcomeText').textContent = `Welcome, ${userName}!`;

                    // Render Iter's first message from the backend
                    addMessage('Iter', data.initial_message);
                } else {
                    // Show the server-supplied error or a generic fallback
                    errorMsg.textContent              = data.error || 'Failed to process photo';
                    errorMsg.style.display            = 'block';
                    document.getElementById('continueBtn').disabled    = false;
                    document.getElementById('continueBtn').textContent = 'Continue';
                }
            } catch (error) {
                // Network-level error (server unreachable, CORS, etc.)
                errorMsg.textContent              = 'An error occurred. Please try again.';
                errorMsg.style.display            = 'block';
                document.getElementById('continueBtn').disabled    = false;
                document.getElementById('continueBtn').textContent = 'Continue';
            }
        }


        // ====================================================================
        // addMessage(sender, message)
        // ====================================================================
        /**
         * Creates a styled message element and appends it to the chat log.
         *
         * @param {string} sender  - "Iter" or "You"
         * @param {string} message - The message text to display
         *
         * Each message block consists of:
         *   - .message-header  → coloured sender label + timestamp
         *   - .message-content → the text bubble (white for Iter, blue for user)
         *
         * After appending, the messages container is scrolled to the bottom so
         * the newest message is always visible.
         */
        function addMessage(sender, message) {
            const messagesDiv = document.getElementById('chatMessages');

            // Format the current time as "HH:MM" for the message header
            const timestamp = new Date().toLocaleTimeString('en-US', {
                hour:   '2-digit',
                minute: '2-digit'
            });

            // Create the outer wrapper div and apply the correct CSS class
            const messageDiv = document.createElement('div');
            messageDiv.className = sender === 'You' ? 'message user-message' : 'message';

            // Build the inner HTML; the sender class controls the label colour
            messageDiv.innerHTML = `
                <div class="message-header">
                    <span class="sender ${sender === 'Iter' ? 'iter' : 'user'}">${sender}</span>
                    <span class="timestamp">${timestamp}</span>
                </div>
                <div class="message-content">${message}</div>
            `;

            messagesDiv.appendChild(messageDiv);

            // Auto-scroll so the latest message is always visible
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }


        // ====================================================================
        // sendMessage()
        // ====================================================================
        /**
         * Reads the textarea, POSTs the message to /send-message, and renders
         * Iter's reply when the response arrives.
         *
         * The send button and textarea are temporarily disabled while the
         * request is in flight to prevent duplicate submissions.
         */
        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const message      = messageInput.value.trim();

            if (!message) return;  // Ignore empty submissions

            // Render the user's message immediately (optimistic UI)
            addMessage('You', message);
            messageInput.value = '';   // Clear the textarea

            // Lock the UI while waiting for the API response
            const sendBtn      = document.getElementById('sendBtn');
            sendBtn.disabled   = true;
            sendBtn.textContent = 'Sending...';

            try {
                const response = await fetch('/send-message', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ message: message })
                });

                const data = await response.json();

                // Render whichever field the server returned
                if (data.response) {
                    addMessage('Iter', data.response);
                } else if (data.error) {
                    addMessage('Iter', data.error);
                }
            } catch (error) {
                // Catch network-level failures
                addMessage('Iter', 'Sorry, an error occurred. Please try again.');
            } finally {
                // Always restore the send button so the user can try again
                sendBtn.disabled    = false;
                sendBtn.textContent = 'Send';
                messageInput.focus();   // Return keyboard focus to the input
            }
        }


        // ====================================================================
        // handleKeyPress(event)
        // ====================================================================
        /**
         * Attached to the textarea's onkeypress handler.
         * Pressing Enter alone submits the message; Shift+Enter inserts a newline.
         */
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();   // Prevent the newline character from appearing
                sendMessage();
            }
        }


        // ====================================================================
        // resetChat()
        // ====================================================================
        /**
         * Asks the user for confirmation, then calls /reset to wipe the
         * server-side session before reloading the page.
         * The page reload returns the user to the greeting screen.
         */
        async function resetChat() {
            if (confirm('Are you sure you want to reset the chat? All conversation history will be lost.')) {
                try {
                    await fetch('/reset', { method: 'POST' });
                    location.reload();   // Triggers the index() route → session.clear()
                } catch (error) {
                    alert('Failed to reset chat. Please refresh the page.');
                }
            }
        }
    </script>
</body>
</html>
